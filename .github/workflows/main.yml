name: main

on: [push]

jobs:
  publish:
    if: ${{ github.event_name == 'push' && github.ref_type == 'tag' }}
    runs-on: windows-latest
    permissions:
      actions: write
      contents: read

    env:
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install .NET
        uses: actions/setup-dotnet@v2
        with:
          dotnet-version: 7.0.x

      - name: Publish (CLI)
        run: >
          dotnet publish DiscordChatExporter.Cli
          --output DiscordChatExporter.Cli/publish/
          --configuration Release

      - name: Upload artifacts (CLI)
        uses: actions/upload-artifact@v3
        with:
          name: DiscordChatExporter.Cli
          path: DiscordChatExporter.Cli/publish/

  deploy:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write

    steps:
      - name: Download artifacts (CLI)
        uses: actions/download-artifact@v3
        with:
          name: DiscordChatExporter.Cli
          path: DiscordChatExporter.Cli

      - name: Create package (CLI)
        shell: pwsh
        run: >
          Compress-Archive
          -Path DiscordChatExporter.Cli/*
          -DestinationPath DiscordChatExporter.Cli.zip
          -Force

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: |
            DiscordChatExporter.Cli.zip

  notify:
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Notify Discord
        uses: tyrrrz/action-http-request@v1
        with:
          url: ${{ secrets.DISCORD_WEBHOOK }}
          method: POST
          headers: |
            Content-Type: application/json; charset=UTF-8
          body: |
            {
              "ContentType": "application/json; charset=UTF-8"
            }
          payload: |
            {
              "content": "**DiscordChatExporter** new version released!\nVersion: `${{ steps.get_version.outputs.tag }}`>"
            }
